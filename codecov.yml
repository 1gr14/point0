# Codecov config — see dev/docs/coverage.md for what the number does and doesn't mean.
#
# Coverage NEVER gates a PR. Both checks are informational: they post a status and a comment, and they
# cannot turn a green PR red. The test matrix is the verdict; coverage is a read-out. The signal worth
# acting on is the patch comment — "the lines you just added have no test" — not the repo-wide percentage.

coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

# Only `packages/*/src` is measured (scripts/coverage.ts enumerates exactly that), but Codecov also walks
# the repo to find files with zero coverage. Keep it away from everything that isn't framework source.
ignore:
  - 'examples/**'
  - 'scripts/**'
  - 'docs/**'
  - 'dev/**'
  - 'packages/*/tests/**'
  - 'packages/*/dist/**'
  - '**/generated/**'
  - '**/*.d.ts'

# The PR comment shows the DIFF only — never a repo-wide total or a header carrying it. Until e2e coverage is
# counted (dev/backlog/coverage.md) the overall number is structurally understated, so publishing it — in a
# comment, a status header, or a README badge — would misread a suite that's actually heavy on int/e2e. Patch
# coverage ("the lines you just added have no test") is the honest, diff-scoped signal; that's all we surface.
comment:
  layout: 'diff, condensed_files'
  require_changes: true
  hide_project_coverage: true

# Every coverage shard uploads its own lcov; Codecov merges the uploads for a commit. Nothing is final
# until all of them land, so don't post a comment (or a status) that only saw half the shards.
codecov:
  notify:
    wait_for_ci: true
