name: test

# Reusable cross-OS test pipeline. Proves the PREBUILT framework's tests pass on each runner OS.
# Called by ci.yml (the PR/branch gate) and release.yml (before publishing a tag). NO build, NO publish here:
# the `dist` artifact is built ONCE (build.yml, ubuntu-only) by the caller and downloaded here, so every OS —
# Windows included — tests exactly the bytes that ship to npm.
#
# Sharded so no runner sits for ~an hour:
#   test-fast → one runner per (OS × shard 1..3): the ~70 fast/parallel files, fanned 3 ways
#   test-slow → one runner per (OS × slow file): each heavy integration file on its OWN runner
# Fanning the slow files out also keeps Windows healthy — a single file per runner can't accumulate
# leaked browser/dev processes to the point of starving the runner (which a full sequential run did).
#
# The matrices come from the caller (ci-decide.ts is the single source): `oses` is the OS list and
# `slow` the slow-test file list — both JSON strings, fromJSON'd below.
on:
  workflow_call:
    inputs:
      oses:
        description: 'JSON array of runner OS labels to test on'
        required: true
        type: string
      slow:
        description: 'JSON array of slow-test files (relative to packages/), one runner each'
        required: true
        type: string
      fast:
        description: 'JSON array of fast-test group ids (scripts/test-plan.ts), one runner each'
        required: true
        type: string

permissions:
  contents: read

jobs:
  test-fast:
    name: fast ${{ matrix.group }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      # Cap concurrent fast runners so a full stable-tag matrix (this job + test-slow, both OSes fired at
      # once) doesn't flood the runner pool. See test-slow's matching cap and dev/backlog/ci-flakes.md.
      max-parallel: 6
      matrix:
        os: ${{ fromJSON(inputs.oses) }}
        # One runner per fast GROUP. The group list — pinned heavies + auto rest-N — is built from
        # scripts/test-plan.ts by ci-decide.ts, so this matrix self-sizes: add a group, a runner appears.
        # No hardcoded shard count to keep in sync.
        group: ${{ fromJSON(inputs.fast) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # The single ubuntu-built `dist` (build.yml) — every OS tests the exact bytes that ship.
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: .
      # dist is already in place, so this install also relinks the `point0` bin.
      - name: Install dependencies
        uses: ./.github/actions/install
      - name: Setup (codegen for examples/templates)
        run: bun run setup
      - name: Install Playwright chromium (Linux)
        if: runner.os == 'Linux'
        run: bunx playwright install --with-deps chromium
      - name: Install Playwright chromium (Windows/macOS)
        if: runner.os != 'Linux'
        run: bunx playwright install chromium
      # This group's files, run in parallel within the runner. test-parallel prints a ▶/✓/✗ breadcrumb per
      # file and bounds each with a per-file timeout (scripts/test-parallel.ts), so a hung file fails fast
      # and named in this step's log instead of riding the job timeout.
      - name: Run fast tests (group ${{ matrix.group }})
        run: bun scripts/test-parallel.ts --group ${{ matrix.group }}

  test-slow:
    name: slow ${{ matrix.file }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      # Cap concurrent slow runners: a stable tag fires every slow file × OS at once (~34 legs), which
      # starves the runner pool and is the load a chunk of the flakes cluster on. See dev/backlog/ci-flakes.md.
      max-parallel: 10
      matrix:
        os: ${{ fromJSON(inputs.oses) }}
        file: ${{ fromJSON(inputs.slow) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # The single ubuntu-built `dist` (build.yml) — every OS tests the exact bytes that ship.
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: .
      - name: Install dependencies
        uses: ./.github/actions/install
      - name: Setup (codegen for examples/templates)
        run: bun run setup
      - name: Install Playwright chromium (Linux)
        if: runner.os == 'Linux'
        run: bunx playwright install --with-deps chromium
      - name: Install Playwright chromium (Windows/macOS)
        if: runner.os != 'Linux'
        run: bunx playwright install chromium
      # One slow integration file, on its own runner — fast wall-clock and no cross-file process buildup.
      # Retry the whole file once on a fresh process. A loaded runner can flake these integration shards
      # (e.g. the point0 dev server intermittently ECONNRESETs on Windows — tracked separately); when such
      # a crash leaves Windows file handles locked, the in-test retry can't recover, but a fresh `bun test`
      # (new temp dirs, no locks) gets a clean shot.
      - name: Run slow test file
        run: |
          for i in 1 2; do
            bun test packages/${{ matrix.file }} && exit 0
            echo "::warning::shard ${{ matrix.file }} attempt $i failed; retrying on a fresh process"
          done
          exit 1
