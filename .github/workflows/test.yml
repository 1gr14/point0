name: test

# Reusable cross-OS test pipeline. Proves the PREBUILT framework's tests pass on each runner OS.
# Called by ci.yml (the PR/branch gate) and release.yml (before publishing a tag). NO build, NO publish here:
# the `dist` artifact is built ONCE (build.yml, ubuntu-only) by the caller and downloaded here, so every OS —
# Windows included — tests exactly the bytes that ship to npm.
#
# Two lanes, straight from the plan (scripts/test.ts — the matrices self-size, nothing is hardcoded here):
#   test-fast → one runner per (OS × group): unit + non-solo int files, parallel within the runner. NO browser
#               anywhere in this lane (enforced by the plan: every browser file is .e2e ⇒ solo), so it skips
#               the Playwright install entirely.
#   test-solo → one runner per (OS × file): every .e2e file + the heavy solo .int files. One file per runner
#               keeps failures attributable and stops leaked browser/dev processes from starving a runner.
# Both lanes run through scripts/test.ts, which wraps every file in a wall-clock guard (a hung file fails
# fast and NAMED, instead of riding the job timeout), retries a timed-out file once on a fresh process, and
# treats "all tests green but the process would not exit" as a pass with a loud warning (the known
# bun-on-Windows teardown hang), not a failure.
on:
  workflow_call:
    inputs:
      oses:
        description: 'JSON array of runner OS labels to test on'
        required: true
        type: string
      groups:
        description: 'JSON array of fast-lane group ids (scripts/test.ts --plan), one runner each'
        required: true
        type: string
      solo:
        description: 'JSON array of solo files (heavy int + every e2e, repo-relative), one runner each'
        required: true
        type: string

permissions:
  contents: read

jobs:
  test-fast:
    name: fast ${{ matrix.group }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.oses) }}
        group: ${{ fromJSON(inputs.groups) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # The single ubuntu-built `dist` (build.yml) — every OS tests the exact bytes that ship.
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: .
      # dist is already in place, so this install also relinks the `point0` bin.
      - name: Install dependencies
        uses: ./.github/actions/install
      - name: Setup (codegen for examples/templates)
        run: bun run setup
      # No Playwright here — the fast lane carries no .e2e files by construction (scripts/test.ts enforces
      # that anything importing the browser util is .e2e, and every .e2e file rides the solo lane).
      - name: Run fast group ${{ matrix.group }}
        run: bun scripts/test.ts --group ${{ matrix.group }}

  test-solo:
    name: solo ${{ matrix.file }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.oses) }}
        file: ${{ fromJSON(inputs.solo) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # The single ubuntu-built `dist` (build.yml) — every OS tests the exact bytes that ship.
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: .
      - name: Install dependencies
        uses: ./.github/actions/install
      - name: Setup (codegen for examples/templates)
        run: bun run setup
      # Only the .e2e files drive a browser; the solo .int heavies (build/cli/mcp/…) never launch one.
      - name: Install Playwright chromium (Linux)
        if: ${{ runner.os == 'Linux' && contains(matrix.file, '.e2e.') }}
        run: bunx playwright install --with-deps chromium
      - name: Install Playwright chromium (Windows/macOS)
        if: ${{ runner.os != 'Linux' && contains(matrix.file, '.e2e.') }}
        run: bunx playwright install chromium
      # One file, its own runner, through the same guarded runner as everywhere else: wall-clock timeout,
      # tree-kill + browser reap on a hang, one fresh-process retry, honest failure extraction in the log.
      - name: Run solo file
        run: bun scripts/test.ts --file ${{ matrix.file }}
