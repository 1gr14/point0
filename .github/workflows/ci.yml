name: CI

on:
  push:
    branches: [main, next]

permissions:
  contents: write # <-- allows pushing tags/commits
  issues: write # <-- needed for GitHub release notes
  pull-requests: write
  id-token: write # <-- required for OIDC/Trusted Publisher

jobs:
  build:
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message, '--skip-ci')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun latest
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check dependency versions are in sync with the catalog table
        run: bun run versions:check

      # Build must precede typecheck: examples/template resolve `@point0/*` via their built `dist/` (exports.types),
      # and `setup` (Prisma client + template `.env`) is required or example/template typecheck fails on the gitignored
      # generated client. Minimal ordering fix — to be refined later.
      - name: Build
        run: bun run build

      - name: Setup (Prisma client + template env for typecheck)
        run: bun run setup

      - name: Type check (tsgo)
        run: bun run types

      - name: Type check (tsc)
        run: bun run types:6

      - name: Lint (eslint)
        run: bun run lint:base

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-files
          path: |
            packages/*/dist/
            package.json
            packages/*/package.json
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # node:
        #   - 18
        #   - 20
        #   - 22
        #   - 24
        bun:
          - latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun ${{ matrix.bun }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-files
          path: .

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Tests gate the release. On `main` they ALWAYS run — publication never bypasses them.
      # On `next` they can be skipped during the early phase by setting the repository variable
      # SKIP_TESTS_ON_NEXT=true (repo → Settings → Secrets and variables → Actions → Variables).
      # The steps skip but the job still succeeds, so `needs: test` lets the prerelease publish
      # proceed. Run sequentially via bun's native runner.
      - name: Setup (Prisma client + template env for tests)
        if: github.ref == 'refs/heads/main' || vars.SKIP_TESTS_ON_NEXT != 'true'
        run: bun run setup

      - name: Run tests
        if: github.ref == 'refs/heads/main' || vars.SKIP_TESTS_ON_NEXT != 'true'
        run: bun test

  release:
    needs: test
    runs-on: ubuntu-latest
    if: >
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next') &&
      !contains(github.event.head_commit.message, '--skip-ci')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # semantic-release requires full history

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: '@point0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-files
          path: .

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Private week: granular access token (repo secret NPM_TOKEN, read+write on the
          # @point0 scope) → token auth, restricted publish, no provenance. At public launch,
          # remove NPM_TOKEN to fall back to OIDC Trusted Publisher + provenance (needs the
          # repo public + Node 24). The token is revoked after release.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
