name: CI

# Cross-OS build + test pipeline. NO publish — this workflow only proves the
# framework builds and its full test suite passes on each runner OS. Publishing
# stays in the release workflow on main/next, never here.
on:
  push:
    branches: [ci-cross-os]
  workflow_dispatch: # manual re-trigger

permissions:
  contents: read

jobs:
  test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Windows runs the whole scaffold→build→browser suite markedly slower than posix; give headroom.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os:
          # ubuntu-latest: verified green. Bringing OSes online one at a time to avoid re-running a
          # proven runner; the final matrix lists all three.
          - windows-latest
    # bash on every OS (Git Bash on Windows) keeps the run steps identical;
    # the per-OS native commands point0 itself needs (PowerShell/taskkill) are
    # spawned by the framework internally, not by these steps.
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # tsdown's build step runs on Node (the framework runtime is Bun).
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun latest
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Applies patchedDependencies (the playwright-core CDP patch the browser
      # tests need on Windows) and links workspace deps.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Every @point0/* imports its siblings from their built dist/.
      - name: Build
        run: bun run build

      # Re-link workspace bins now that @point0/engine/dist/cli.js exists — on a
      # fresh install the `point0` bin target is unbuilt, so bun skips the
      # symlink and setup's `point0 generate` would fail with "command not found".
      - name: Link freshly built workspace bins
        run: bun install --frozen-lockfile

      # Codegen only (Prisma client + point0 generate), no DB — the apps'
      # src/generated is gitignored, and types/tests need it present.
      - name: Setup (codegen for examples/templates)
        run: bun run setup

      # Linux can pull OS libs via --with-deps; Windows/macOS don't support it.
      # Either way this installs chromium AND chrome-headless-shell (Windows
      # browser tests spawn the latter over CDP).
      - name: Install Playwright chromium (Linux)
        if: runner.os == 'Linux'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright chromium (Windows/macOS)
        if: runner.os != 'Linux'
        run: bunx playwright install chromium

      # Per-file runner: each test file runs in its own `bun test` process (slow
      # integration files strictly one-per-process), which is the only way the
      # suite stays honest across module-level state and port reuse.
      - name: Run tests
        run: bun run testa
